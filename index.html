<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>赛博炼丹炉</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
    }

    /* ── 顶部导航 ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 60px;
      background: rgba(10,10,15,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }
    .nav-tag {
      font-size: 12px;
      color: #6b7280;
      background: rgba(255,255,255,0.05);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* ── 主体 ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .step-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 22px;
      font-weight: 700;
      color: #f1f1f5;
      margin-bottom: 24px;
    }

    /* ── 博主卡片 ── */
    .creator-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 56px;
    }
    .creator-card {
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .creator-card:hover { border-color: rgba(167,139,250,0.4); transform: translateY(-2px); }
    .creator-card.active { border-color: #a78bfa; background: rgba(167,139,250,0.08); }

    .active-badge {
      position: absolute;
      top: 16px; right: 16px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #a78bfa;
      box-shadow: 0 0 8px #a78bfa;
      display: none;
    }
    .creator-card.active .active-badge { display: block; }

    .creator-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      margin-bottom: 14px;
    }
    .creator-name { font-size: 16px; font-weight: 700; color: #f1f1f5; margin-bottom: 4px; }
    .creator-position { font-size: 12px; color: #a78bfa; margin-bottom: 14px; font-weight: 500; }
    .creator-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .tag {
      font-size: 11px; padding: 3px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      color: #9ca3af;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .creator-formula {
      font-size: 12px; color: #6b7280; line-height: 1.7;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 14px;
    }
    .creator-formula strong { color: #9ca3af; font-weight: 600; }

    /* ── STEP 2 输入区 ── */
    .input-section { margin-bottom: 40px; }

    .no-select-tip {
      text-align: center;
      padding: 40px;
      color: #4b5563;
      font-size: 14px;
      background: rgba(255,255,255,0.02);
      border: 1.5px dashed rgba(255,255,255,0.06);
      border-radius: 16px;
    }

    /* 快捷标签分组 */
    .quick-groups { margin-bottom: 18px; }
    .quick-group { margin-bottom: 12px; }
    .quick-group-label {
      font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
      color: #374151; text-transform: uppercase;
      margin-bottom: 7px;
    }
    .quick-row {
      display: flex; flex-wrap: wrap; gap: 7px;
    }
    .quick-chip {
      font-size: 12px; padding: 5px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      color: #9ca3af;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: all 0.15s;
    }
    .quick-chip:hover {
      background: rgba(167,139,250,0.12);
      border-color: rgba(167,139,250,0.3);
      color: #c4b5fd;
    }
    .quick-chip.refine:hover {
      background: rgba(96,165,250,0.1);
      border-color: rgba(96,165,250,0.3);
      color: #93c5fd;
    }
    /* 热点tag橙色调 */
    .quick-chip.hot { border-color: rgba(251,146,60,0.2); color: #9ca3af; }
    .quick-chip.hot:hover { background: rgba(251,146,60,0.1); border-color: rgba(251,146,60,0.4); color: #fdba74; }
    /* 赛道tag绿色调 */
    .quick-chip.track { border-color: rgba(52,211,153,0.15); color: #9ca3af; }
    .quick-chip.track:hover { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.35); color: #6ee7b7; }
    .quick-chip.track.selected { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.5); color: #6ee7b7; }
    /* 高频词紫色调（默认） */
    .quick-chip.freq.selected { background: rgba(167,139,250,0.15); border-color: rgba(167,139,250,0.5); color: #c4b5fd; }

    /* 输入行 */
    .input-row {
      display: flex; gap: 12px; align-items: flex-end;
    }
    .topic-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 15px;
      color: #f1f1f5;
      outline: none;
      resize: none;
      height: 56px;
      font-family: inherit;
      line-height: 1.6;
      transition: border-color 0.2s, height 0.1s;
    }
    .topic-input::placeholder { color: #4b5563; }
    .topic-input:focus { border-color: rgba(167,139,250,0.5); }

    .send-btn {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border: none;
      border-radius: 14px;
      padding: 0 28px;
      height: 56px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      min-width: 110px;
    }
    .send-btn:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(167,139,250,0.3); }
    .send-btn:active { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    .input-hint {
      font-size: 11px; color: #374151;
      margin-top: 8px; padding-left: 2px;
    }

    /* ── 对话历史区 ── */
    .divider { height: 1px; background: rgba(255,255,255,0.05); margin: 48px 0; }

    .chat-history { display: none; }
    .chat-history.visible { display: block; }

    .msg { margin-bottom: 28px; }

    .msg-user-wrap {
      display: flex; justify-content: flex-end;
      margin-bottom: 16px;
    }
    .msg-user {
      max-width: 60%;
      background: rgba(167,139,250,0.15);
      border: 1px solid rgba(167,139,250,0.25);
      border-radius: 14px 14px 4px 14px;
      padding: 12px 18px;
      font-size: 14px; color: #e8e8f0; line-height: 1.6;
    }

    .msg-ai-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #a78bfa; font-weight: 600;
      margin-bottom: 10px;
    }
    .ai-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #a78bfa; box-shadow: 0 0 6px #a78bfa;
    }

    .msg-ai-card {
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: 4px 16px 16px 16px;
      overflow: hidden;
    }
    .msg-ai-header {
      display: flex; align-items: center; justify-content: flex-end;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(167,139,250,0.04);
    }
    .copy-btn {
      font-size: 12px; color: #6b7280;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 4px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .copy-btn:hover { color: #c4b5fd; border-color: rgba(167,139,250,0.3); }

    .msg-ai-body {
      padding: 22px 24px;
      font-size: 14px; line-height: 2;
      color: #d1d5db;
      white-space: pre-wrap; word-break: break-word;
    }

    /* loading */
    .msg-loading {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 22px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px 16px 16px 16px;
      font-size: 13px; color: #4b5563;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(167,139,250,0.2);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* toast */
    .toast {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(167,139,250,0.9);
      color: #fff; font-size: 13px; font-weight: 600;
      padding: 8px 20px; border-radius: 20px;
      opacity: 0; transition: opacity 0.2s;
      pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<nav>
  <div class="logo">✦ 赛博炼丹炉</div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="apiStatus" class="nav-tag" style="cursor:pointer;display:flex;align-items:center;gap:6px" onclick="toggleApiConfig()" title="点击配置 API Key">
      <span id="apiDot" style="width:7px;height:7px;border-radius:50%;background:#4b5563;display:inline-block"></span>
      <span id="apiLabel">API 未连接</span>
    </div>
    <div class="nav-tag">Beta · 对标账号驱动</div>
  </div>
</nav>

<!-- API 配置浮层 -->
<div id="apiConfigPanel" style="display:none;position:fixed;top:70px;right:20px;z-index:200;background:#16161f;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.5)">
  <div style="font-size:13px;font-weight:600;color:#e8e8f0;margin-bottom:12px">⚙️ API 配置</div>

  <input id="cfgUrl" type="text" style="width:100%;background:#0a0a0f;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 10px;color:#e8e8f0;font-size:12px;margin-bottom:10px;outline:none" value="https://aigc.sankuai.com/v1/openai/native/chat/completions" />
  <div style="font-size:12px;color:#6b7280;margin-bottom:8px">API Key（App ID）</div>
  <input id="cfgKey" type="password" style="width:100%;background:#0a0a0f;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 10px;color:#e8e8f0;font-size:12px;margin-bottom:10px;outline:none" placeholder="输入你的 App ID" value="22028349023677911116" />
  <div style="font-size:12px;color:#6b7280;margin-bottom:8px">模型</div>
  <select id="cfgModel" style="width:100%;background:#0a0a0f;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 10px;color:#e8e8f0;font-size:12px;margin-bottom:14px;outline:none">
    <option value="gpt-4o-mini">gpt-4o-mini（推荐，速度快）</option>
    <option value="gpt-4o-2024-11-20">gpt-4o-2024-11-20（能力更强）</option>
    <option value="anthropic.claude-opus-4">claude-opus-4（需 Bedrock 权限）</option>
  </select>
  <div style="display:flex;gap:8px">
    <button onclick="saveApiConfig()" style="flex:1;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;border:none;border-radius:8px;padding:8px;font-size:13px;cursor:pointer;font-weight:600">保存并测试</button>
    <button onclick="document.getElementById('apiConfigPanel').style.display='none'" style="background:rgba(255,255,255,0.06);color:#9ca3af;border:none;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer">关闭</button>
  </div>
  <div id="cfgMsg" style="font-size:12px;margin-top:10px;color:#6b7280"></div>
</div>

    { label: '图鉴体', value: '用乐府图鉴体写，给每种类型立传，每种4句七言，第4句要是"刀"' },
    { label: '精炼30秒版', value: '缩短到30秒版本，更精炼' },
    { label: '强化开头钩子', value: '加强开头钩子，前3秒更抓人' },
  ];

  let selectedCreator = null;
  let conversationHistory = [];
  let hasGenerated = false;
  let isLoading = false;

  // ── API 配置（可在右上角面板修改）──
  let apiConfig = {
    url: localStorage.getItem('friday_api_url') || 'https://aigc.sankuai.com/v1/openai/native/chat/completions',
    key: localStorage.getItem('friday_api_key') || '22028349023677911116',
    model: localStorage.getItem('friday_api_model') || 'gpt-4o-mini'
  };

  function toggleApiConfig() {
    const panel = document.getElementById('apiConfigPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    if (panel.style.display === 'block') {
      document.getElementById('cfgUrl').value = apiConfig.url;
      document.getElementById('cfgKey').value = apiConfig.key;
      document.getElementById('cfgModel').value = apiConfig.model;
    }
  }

  async function saveApiConfig() {
    const url = document.getElementById('cfgUrl').value.trim();
    const key = document.getElementById('cfgKey').value.trim();
    const model = document.getElementById('cfgModel').value;
    const msg = document.getElementById('cfgMsg');
    if (!url || !key) { msg.style.color = '#f87171'; msg.textContent = '请填写接口地址和 API Key'; return; }
    msg.style.color = '#6b7280'; msg.textContent = '正在测试连接...';
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
        body: JSON.stringify({ model, messages: [{ role: 'user', content: 'hi' }], max_tokens: 5 })
      });
      if (!res.ok) throw new Error(res.status);
      apiConfig = { url, key, model };
      localStorage.setItem('friday_api_url', url);
      localStorage.setItem('friday_api_key', key);
      localStorage.setItem('friday_api_model', model);
      setApiStatus(true);
      msg.style.color = '#34d399'; msg.textContent = '✓ 连接成功，配置已保存';
      setTimeout(() => document.getElementById('apiConfigPanel').style.display = 'none', 1500);
    } catch (e) {
      msg.style.color = '#f87171'; msg.textContent = `✗ 连接失败：${e.message}`;
    }
  }

  function setApiStatus(ok) {
    document.getElementById('apiDot').style.background = ok ? '#34d399' : '#f87171';
    document.getElementById('apiLabel').textContent = ok ? 'API 已连接' : 'API 连接失败';
  }

  // 页面加载时自动检测 API 连通性
  (async () => {
    try {
      const res = await fetch(apiConfig.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiConfig.key}` },
        body: JSON.stringify({ model: apiConfig.model, messages: [{ role: 'user', content: 'hi' }], max_tokens: 5 })
      });
      setApiStatus(res.ok);
    } catch { setApiStatus(false); }
  })();

  function selectCreator(card) {
    if (card.style.cursor === 'default') return;
    document.querySelectorAll('.creator-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    selectedCreator = card.dataset.id;
    conversationHistory = [];
    hasGenerated = false;

    document.getElementById('noSelectTip').style.display = 'none';
    document.getElementById('inputArea').style.display = 'block';
    document.getElementById('chatHistory').classList.remove('visible');
    document.getElementById('chatHistory').innerHTML = '';
    selectedPrefs = new Set();
    renderQuickChips(false);
    document.getElementById('topicInput').focus();
  }

  function renderQuickChips(refineMode) {
    const container = document.getElementById('quickGroups');
    document.getElementById('sendBtn').textContent = refineMode ? '重新生成' : '生成脚本';
    document.getElementById('inputHint').textContent = refineMode
      ? '继续输入修改建议，或点击快捷标签调整 · Enter 发送'
      : 'Enter 发送 · Shift+Enter 换行';
    document.getElementById('topicInput').placeholder = refineMode
      ? '告诉我怎么改，例如：结尾改得更有力、换成唱词版...'
      : '输入内容方向，例如：SBTI热点、职场加班文化...';

    if (refineMode) {
      container.innerHTML = `<div class="quick-group"><div class="quick-row">${
        QUICK_REFINE.map(c => `<span class="quick-chip refine" onclick="sendQuick('${c.value}')">${c.label}</span>`).join('')
      }</div></div>`;
      return;
    }

    const tags = CREATOR_TAGS[selectedCreator];
    if (!tags) { container.innerHTML = ''; return; }
    // 近期热点：点击直接填入发送
    // 赛道话题 & 博主高频词：点击选中/取消，作为偏好附加
    container.innerHTML = [
      { label: '近期热点', cls: 'hot', mode: 'send', items: tags.hot },
      { label: '赛道话题', cls: 'track', mode: 'select', items: tags.track },
      { label: '博主高频词', cls: 'freq', mode: 'select', items: tags.freq },
    ].map(g => `
      <div class="quick-group">
        <div class="quick-group-label">${g.label}</div>
        <div class="quick-row">${g.items.map(c =>
          g.mode === 'send'
            ? `<span class="quick-chip ${g.cls}" onclick="hotQuick('${c.value}','${c.url||''}')" title="点击生成脚本 · 右键可复制链接">${c.label}</span>`
            : `<span class="quick-chip ${g.cls}" onclick="togglePref(this, '${c.value}')">${c.label}</span>`
        ).join('')}</div>
      </div>
    `).join('');
  }

  // 选中偏好 tag（赛道/高频词）
  let selectedPrefs = new Set();
  function togglePref(el, value) {
    if (selectedPrefs.has(value)) {
      selectedPrefs.delete(value);
      el.classList.remove('selected');
    } else {
      selectedPrefs.add(value);
      el.classList.add('selected');
    }
  }

  // 近期热点：填入输入框 + 新标签页打开抖音搜索
  function hotQuick(value, url) {
    if (!selectedCreator || isLoading) return;
    document.getElementById('topicInput').value = value;
    document.getElementById('topicInput').focus();
    if (url) window.open(url, '_blank');
  }

  function sendQuick(text) {
    if (!selectedCreator || isLoading) return;
    document.getElementById('topicInput').value = text;
    handleSend();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleSend() {
    const input = document.getElementById('topicInput');
    const text = input.value.trim();
    if (!text || !selectedCreator || isLoading) return;
    input.value = '';
    input.style.height = 'auto';

    // 始终保持 system prompt 为最新版本（第一条消息或 system 内容变化时更新）
    const latestPrompt = CREATORS[selectedCreator].systemPrompt;
    if (conversationHistory.length === 0) {
      conversationHistory.push({ role: 'system', content: latestPrompt });
    } else if (conversationHistory[0].role === 'system' && conversationHistory[0].content !== latestPrompt) {
      conversationHistory[0].content = latestPrompt;
    }
    // 拼入选中的风格偏好
    const prefs = [...selectedPrefs];
    const fullText = prefs.length > 0
      ? `${text}\n\n【风格偏好】请结合以下偏好生成：${prefs.join('、')}`
      : text;
    conversationHistory.push({ role: 'user', content: fullText });

    const history = document.getElementById('chatHistory');
    history.classList.add('visible');

    // 用户气泡
    const userDiv = document.createElement('div');
    userDiv.className = 'msg';
    const prefTags = [...selectedPrefs];
    const prefHtml = prefTags.length > 0
      ? `<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">${prefTags.map(p => `<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(167,139,250,0.15);color:#c4b5fd;border:1px solid rgba(167,139,250,0.25)">${p}</span>`).join('')}</div>`
      : '';
    userDiv.innerHTML = `<div class="msg-user-wrap"><div class="msg-user">${escHtml(text)}${prefHtml}</div></div>`;
    history.appendChild(userDiv);

    // loading
    const loadDiv = document.createElement('div');
    loadDiv.className = 'msg';
    loadDiv.innerHTML = `<div class="msg-loading"><div class="spinner"></div>正在按照博主风格生成脚本...</div>`;
    history.appendChild(loadDiv);
    scrollBottom();

    callAI(loadDiv);
  }

  async function callAI(loadDiv) {
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('topicInput').disabled = true;

    try {
      const res = await fetch(apiConfig.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiConfig.key}` },
        body: JSON.stringify({
          model: apiConfig.model,
          messages: conversationHistory,
          temperature: 0.88,
          max_tokens: 2000,
          stream: true
        })
      });
      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`${res.status}: ${errText}`);
      }

      // 流式输出
      loadDiv.remove();
      const history = document.getElementById('chatHistory');
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `
        <div class="msg-ai-label"><div class="ai-dot"></div>${CREATORS[selectedCreator].name} 风格脚本</div>
        <div class="msg-ai-card">
          <div class="msg-ai-header">
            <button class="copy-btn" id="streamCopyBtn" disabled>复制全文</button>
          </div>
          <div class="msg-ai-body" id="streamBody"></div>
        </div>`;
      history.appendChild(div);

      const streamBody = document.getElementById('streamBody');
      const copyBtn = document.getElementById('streamCopyBtn');
      let fullReply = '';

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const chunk = JSON.parse(data);
            const delta = chunk.choices?.[0]?.delta?.content || '';
            if (delta) {
              fullReply += delta;
              streamBody.innerHTML = renderMd(fullReply);
              scrollBottom();
            }
          } catch {}
        }
      }

      conversationHistory.push({ role: 'assistant', content: fullReply });
      // 激活复制按钮
      const safeContent = escAttr(fullReply);
      copyBtn.disabled = false;
      copyBtn.id = '';
      copyBtn.setAttribute('onclick', `copyText(this, \`${safeContent}\`)`);

    } catch (err) {
      console.warn('Friday API 调用失败，降级到示例模式：', err);
      const lastUser = conversationHistory[conversationHistory.length - 1].content;
      const reply = demoReply(lastUser);
      conversationHistory.push({ role: 'assistant', content: reply });
      loadDiv.remove();
      appendAIMsg(reply, true);
    } finally {
      isLoading = false;
      hasGenerated = true;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('topicInput').disabled = false;
      document.getElementById('topicInput').focus();
      renderQuickChips(true);
      scrollBottom();
    }
  }

  function appendAIMsg(content, isDemo) {
    const history = document.getElementById('chatHistory');
    const div = document.createElement('div');
    div.className = 'msg';
    const safeContent = escAttr(content);
    div.innerHTML = `
      <div class="msg-ai-label"><div class="ai-dot"></div>${CREATORS[selectedCreator].name} 风格脚本${isDemo ? ' <span style="color:#4b5563;font-weight:400">（示例）</span>' : ''}</div>
      <div class="msg-ai-card">
        <div class="msg-ai-header">
          <button class="copy-btn" onclick="copyText(this, \`${safeContent}\`)">复制全文</button>
        </div>
        <div class="msg-ai-body">${renderMd(content)}</div>
      </div>`;
    history.appendChild(div);
  }

  function demoReply(userMsg) {
    // 提取核心关键词（去掉风格偏好部分）
    const coreMsg = userMsg.split('\n\n【风格偏好】')[0].trim();
    const prefs = userMsg.includes('【风格偏好】')
      ? userMsg.split('【风格偏好】请结合以下偏好生成：')[1] || ''
      : '';

    const isSong = coreMsg.includes('唱词') || coreMsg.includes('歌词') || coreMsg.includes('口水歌') || prefs.includes('乐府古风体');
    const isRefine = hasGenerated;
    const topic = coreMsg.replace(/用他的风格[，,]?|结合|生成一个脚本|脚本|请|帮我/g, '').trim() || coreMsg;

    const prefNote = prefs ? `\n（已融入风格偏好：${prefs}）` : '';
    const header = isRefine ? `【已根据你的要求调整】${prefNote}\n\n` : `【推荐标题】\n① "${topic}，我沉默了整整三分钟"\n② "测了个${topic}，终于知道为什么我这辈子出不了头了"\n③ "${topic}刷屏了，打工人对号入座，全中"\n\n━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

    if (isSong) {
      return header + `【乐府古风·口水歌版】\n\n${topic}兮${topic}，\n打工人兮命多舛。\n晨起打卡夜未归，\n背锅之事年年有。\n\n吗喽吗喽你最惨，\n干活最多钱最少，\n背锅第一晋升末，\n裁员名单头一号。\n\n装死装死有绝活，\n消息已读就不回，\n领导以为你很忙，\n其实椅子没坐热。\n\n哦no哦no哦no哦，\n心里明白嘴不说，\n不管你是哪一款，\n进了职场都一样——\n最后解锁同一个，\n隐藏人格叫做忍！\n\n━━━━━━━━━━━━━━━━━━━━━━━━\n⚠️ 当前为示例内容，配置 API Key 后将生成真实脚本`;
    }

    const hook = coreMsg.includes('钩子') || coreMsg.includes('开头')
      ? `"等等——你知道${topic}是什么吗？我看完直接沉默了。"`
      : `"${topic}最近刷屏了，我研究了一下。\n看完我沉默了整整三分钟。"`;

    const ending = coreMsg.includes('结尾') || coreMsg.includes('金句')
      ? `"不管你怎么看${topic}——\n进了职场，你只有一个人格：\n忍者。\n而且，还得忍出微笑。"`
      : `"不管${topic}怎么说，\n进了职场都会慢慢解锁同一个隐藏人格——\n忍。者。"`;

    return header + `【完整脚本】\n\n▍钩子（0-4秒）\n${hook}\n\n▍展开（5-50秒）\n近日有一事，名曰${topic}，\n传遍天下人，各有其感悟。\n与君歌一曲，请君对号入座——\n\n吗喽吗喽命最苦，\n开会点头干活忙，\n背锅第一晋升末，\n裁员名单头一行。\n\n装死装死有绝活，\n消息已读不回复，\n旁人以为你很忙，\n其实椅子没坐热。\n\n▍收尾金句（52-60秒）\n${ending}\n\n━━━━━━━━━━━━━━━━━━━━━━━━\n\n【视觉建议】\n• 钩子：牛头人坐在办公桌前盯着手机，表情空白\n• 展开：每个场景切换荒诞画面，蓝色大字报风格\n• 收尾：黑屏白字，"忍者"两字逐字出现\n\n━━━━━━━━━━━━━━━━━━━━━━━━\n⚠️ 当前为示例内容，配置 API Key 后将生成真实脚本`;
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '已复制 ✓';
      setTimeout(() => btn.textContent = '复制全文', 2000);
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    });
  }

  function scrollBottom() {
    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 50);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
  function escAttr(s) {
    return s.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  }

  // 轻量 Markdown 渲染（支持 ###标题、**粗体**、`代码`、--- 分割线、换行）
  function renderMd(s) {
    return s
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      // 标题 ### ## #
      .replace(/^### (.+)$/gm, '<div style="font-size:13px;font-weight:700;color:#a78bfa;margin:14px 0 6px;letter-spacing:.5px;text-transform:uppercase">$1</div>')
      .replace(/^## (.+)$/gm,  '<div style="font-size:14px;font-weight:700;color:#c4b5fd;margin:16px 0 6px">$1</div>')
      .replace(/^# (.+)$/gm,   '<div style="font-size:15px;font-weight:700;color:#e8e8f0;margin:16px 0 8px">$1</div>')
      // 粗体 **text**
      .replace(/\*\*(.+?)\*\*/g, '<strong style="color:#e8e8f0;font-weight:700">$1</strong>')
      // 行内代码 `code`
      .replace(/`([^`]+)`/g, '<code style="background:rgba(167,139,250,0.12);color:#c4b5fd;padding:1px 5px;border-radius:4px;font-size:12px">$1</code>')
      // 分割线 --- 或 ━━━
      .replace(/^[-━]{3,}$/gm, '<div style="border-top:1px solid rgba(255,255,255,0.08);margin:12px 0"></div>')
      // 换行
      .replace(/\n/g, '<br>');
  }
</script>
